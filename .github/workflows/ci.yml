name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  contracts:
    name: Contracts (Hardhat compile + tests + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Compile contracts
        run: npx hardhat compile
      - name: Run contract tests
        run: npx hardhat test
      - name: Run coverage
        run: npx hardhat coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: contracts/coverage/

  slither:
    name: Contracts (Slither static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json
      - name: Install npm deps
        working-directory: contracts
        run: npm ci
      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        continue-on-error: true
        id: slither
        with:
          target: 'contracts/'
          fail-on: 'high'
          slither-args: '--exclude-informational --exclude-low'
          solc-version: '0.8.20'

  user-service:
    name: User Service (build + lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/user-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test -- --passWithNoTests

  mini-app:
    name: Mini App (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mini-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mini-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
